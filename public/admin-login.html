<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PraktikumSubmit - Login Admin</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- Google Font (Outfit) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .error-message {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 0.85rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            text-align: center;
            display: none;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body class="flex-center">

    <div class="glass-card" style="max-width: 440px; padding: 2.5rem;">
        <div class="text-center" style="margin-bottom: 2rem;">
            <div style="font-size: 3rem; margin-bottom: 0.5rem;">🛡️</div>
            <h2>Portal Admin / Dosen</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Masukkan kode akses admin untuk melanjutkan.</p>
        </div>

        <div class="error-message" id="errorBox">Kode akses salah. Silakan coba lagi.</div>

        <form action="/admin-login" method="POST">
            <div class="form-group">
                <label for="password">Kode Akses / Sandi</label>
                <input type="password" id="password" name="password" placeholder="Masukkan kode akses" required style="width: 100%; padding: 0.85rem 1.2rem; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--card-border); border-radius: 12px; color: var(--text-main); font-family: var(--font-family); font-size: 1rem; outline: none;">
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Masuk</button>
        </form>

        <a href="/" class="back-link">← Kembali ke Halaman Utama</a>
    </div>

    <script>
        // Cek parameter error di URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === '1') {
            document.getElementById('errorBox').style.display = 'block';
        }
    </script>
</body>
</html>
