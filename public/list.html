<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PraktikumSubmit - Daftar Pengumpulan</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- Google Font (Outfit) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">PraktikumSubmit</div>
        <nav>
            <a href="/submit.html">Kumpul Tugas</a>
            <a href="/list.html" class="active">Daftar Pengumpulan</a>
        </nav>
    </header>

    <main style="display: block;">
        <div class="admin-container">
            <div class="table-header">
                <div>
                    <h1 style="margin-bottom: 4px;">Daftar Pengumpulan Tugas</h1>
                    <p style="color: var(--text-muted);">Memantau pengumpulan tugas mahasiswa di Azure Storage & MySQL.</p>
                </div>
                <button onclick="fetchTasks()" class="btn btn-secondary" style="padding: 0.6rem 1.2rem;">↻ Refresh</button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>NIM</th>
                            <th>Nama</th>
                            <th>Kelas</th>
                            <th>Mata Kuliah</th>
                            <th>Waktu Pengumpulan</th>
                            <th>Status</th>
                            <th>File Tugas</th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody">
                        <tr>
                            <td colspan="7" style="text-align: center; color: var(--text-muted); padding: 3rem;">
                                Mengambil data dari server...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        async function fetchTasks() {
            const tableBody = document.getElementById('taskTableBody');
            try {
                const response = await fetch('/api/tasks');
                if (!response.ok) {
                    throw new Error('Gagal mengambil data dari server');
                }
                const tasks = await response.json();

                if (tasks.length === 0) {
                    tableBody.innerHTML = `
                        <tr>
                            <td colspan="7" style="text-align: center; color: var(--text-muted); padding: 3rem;">
                                Belum ada pengumpulan tugas saat ini.
                            </td>
                        </tr>
                    `;
                    return;
                }

                tableBody.innerHTML = tasks.map(task => {
                    // Format Date
                    const date = new Date(task.submitted_at);
                    const formattedDate = date.toLocaleDateString('id-ID', {
                        day: '2-digit',
                        month: 'short',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    // Badge class
                    const statusClass = task.status.toLowerCase() === 'submitted' 
                        ? 'badge-submitted' 
                        : 'badge-pending';

                    return `
                        <tr>
                            <td style="font-weight: 600;">${escapeHtml(task.nim)}</td>
                            <td>${escapeHtml(task.name)}</td>
                            <td>${escapeHtml(task.class)}</td>
                            <td>${escapeHtml(task.course)}</td>
                            <td>${formattedDate}</td>
                            <td>
                                <span class="badge ${statusClass}">${escapeHtml(task.status)}</span>
                            </td>
                            <td>
                                <a href="${task.file_url}" target="_blank" class="download-link">Unduh File ↗</a>
                            </td>
                        </tr>
                    `;
                }).join('');

            } catch (error) {
                console.error(error);
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; color: #ef4444; padding: 3rem; font-weight: 600;">
                            Gagal memuat data: ${error.message}
                        </td>
                    </tr>
                `;
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text
                .toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Fetch tasks on page load
        window.addEventListener('DOMContentLoaded', fetchTasks);
    </script>
</body>
</html>
